name: CD Promote Prod

on:
  workflow_dispatch:
    inputs:
      backend_tag:
        description: "Backend image tag (example: sha-abc123def456)"
        required: false
        type: string
      frontend_tag:
        description: "Frontend image tag (example: prod-sha-abc123def456)"
        required: false
        type: string

concurrency:
  group: cd-promote-prod-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: read

jobs:
  promote-prod:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      OWNER: ruby0322
      FRONTEND_IMAGE: pd-care-frontend
      BACKEND_IMAGE: pd-care-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Validate input tag formats
        run: |
          set -euo pipefail
          BACKEND_TAG="${{ github.event.inputs.backend_tag }}"
          FRONTEND_TAG="${{ github.event.inputs.frontend_tag }}"
          if [[ -z "${BACKEND_TAG}" && -z "${FRONTEND_TAG}" ]]; then
            echo "Provide at least one of backend_tag or frontend_tag."
            exit 1
          fi
          if [[ -n "${BACKEND_TAG}" ]]; then
            [[ "${BACKEND_TAG}" =~ ^sha-[0-9a-f]{12}$ ]] || {
              echo "backend_tag must match sha-<12-hex>"; exit 1;
            }
          fi
          if [[ -n "${FRONTEND_TAG}" ]]; then
            [[ "${FRONTEND_TAG}" =~ ^prod-sha-[0-9a-f]{12}$ ]] || {
              echo "frontend_tag must match prod-sha-<12-hex>"; exit 1;
            }
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate tags exist in GHCR
        run: |
          set -euo pipefail
          if [[ -n "${{ github.event.inputs.backend_tag }}" ]]; then
            docker manifest inspect "${REGISTRY}/${OWNER}/${BACKEND_IMAGE}:${{ github.event.inputs.backend_tag }}" >/dev/null
          fi
          if [[ -n "${{ github.event.inputs.frontend_tag }}" ]]; then
            docker manifest inspect "${REGISTRY}/${OWNER}/${FRONTEND_IMAGE}:${{ github.event.inputs.frontend_tag }}" >/dev/null
          fi

      - name: Update prod overlay image tags
        run: |
          python - <<'PY'
          from pathlib import Path

          def update_image_tag(file_path: Path, image_name: str, new_tag: str) -> None:
              if not new_tag:
                  return

              lines = file_path.read_text().splitlines()
              current_name = None
              updated = False
              for index, line in enumerate(lines):
                  stripped = line.strip()
                  if stripped.startswith("- name:"):
                      current_name = stripped.split(":", 1)[1].strip()
                      continue
                  if stripped.startswith("newTag:") and current_name == image_name:
                      indent = line[: line.index("newTag:")]
                      lines[index] = f"{indent}newTag: {new_tag}"
                      updated = True
                      current_name = None

              if not updated:
                  raise SystemExit(f"Could not find image entry for {image_name}")
              file_path.write_text("\n".join(lines) + "\n")

          overlay_file = Path("k8s/overlays/prod/kustomization.yaml")
          update_image_tag(overlay_file, "pd-care-frontend", "${{ github.event.inputs.frontend_tag }}")
          update_image_tag(overlay_file, "pd-care-backend", "${{ github.event.inputs.backend_tag }}")
          PY

      - name: Configure bot git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit prod promotion
        run: |
          if git diff --quiet -- k8s/overlays/prod/kustomization.yaml; then
            echo "No prod image changes to commit."
            exit 0
          fi
          git add k8s/overlays/prod/kustomization.yaml
          CHANGED_COMPONENTS=()
          if [[ -n "${{ github.event.inputs.frontend_tag }}" ]]; then
            CHANGED_COMPONENTS+=("frontend")
          fi
          if [[ -n "${{ github.event.inputs.backend_tag }}" ]]; then
            CHANGED_COMPONENTS+=("backend")
          fi
          git commit -m "ci(cd): promote prod images (${CHANGED_COMPONENTS[*]})"
          git push origin HEAD:main
