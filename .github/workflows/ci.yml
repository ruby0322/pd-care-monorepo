name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint and migration policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            apps/backend/requirements.txt
            apps/backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix apps/frontend ci
          python -m pip install --upgrade pip
          python -m pip install -r apps/backend/requirements-dev.txt

      - name: Run lint
        run: npm run lint

  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            apps/backend/requirements.txt
            apps/backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch==2.9.1 torchvision==0.24.1 --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -r apps/backend/requirements-dev.txt

      - name: Run backend tests
        run: npm run test:backend

  frontend-test:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix apps/frontend ci

      - name: Run frontend unit tests
        run: npm --prefix apps/frontend run test:unit -- --ci

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix apps/frontend ci

      - name: Build frontend
        run: npm --prefix apps/frontend run build

  k8s-manifests:
    name: K8s manifest render
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.0"

      - name: Render overlays
        run: |
          kubectl kustomize k8s/overlays/dev > /tmp/pd-care-dev.yaml
          kubectl kustomize k8s/overlays/prod > /tmp/pd-care-prod.yaml
