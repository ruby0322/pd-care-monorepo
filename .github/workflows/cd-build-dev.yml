name: CD Build Dev

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

concurrency:
  group: cd-build-dev-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  build-and-promote-dev:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      OWNER: ruby0322
      FRONTEND_IMAGE: pd-care-frontend
      BACKEND_IMAGE: pd-care-backend
      SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Check changed paths
        id: paths
        run: |
          CHANGED_FILES="$(git show --pretty='' --name-only "${SOURCE_SHA}")"
          echo "Changed files:"
          echo "${CHANGED_FILES}"
          if echo "${CHANGED_FILES}" | grep -Eq '^(apps/frontend/|apps/backend/)'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Exit when app code unchanged
        if: steps.paths.outputs.should_run != 'true'
        run: |
          echo "No frontend/backend changes in ${SOURCE_SHA}; skipping image build and dev promotion."
          exit 0

      - name: Set up Docker Buildx
        if: steps.paths.outputs.should_run == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.paths.outputs.should_run == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        if: steps.paths.outputs.should_run == 'true'
        run: |
          echo "BACKEND_TAG=sha-${SOURCE_SHA::12}" >> "$GITHUB_ENV"
          echo "DEV_FRONTEND_TAG=dev-sha-${SOURCE_SHA::12}" >> "$GITHUB_ENV"
          echo "PROD_FRONTEND_TAG=prod-sha-${SOURCE_SHA::12}" >> "$GITHUB_ENV"

      - name: Build and push backend image
        if: steps.paths.outputs.should_run == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./apps/backend
          push: true
          build-args: |
            HF_TOKEN=${{ secrets.HF_TOKEN }}
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.BACKEND_IMAGE }}:${{ env.BACKEND_TAG }}

      - name: Build and push dev frontend image
        if: steps.paths.outputs.should_run == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./apps/frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=/api
            NEXT_PUBLIC_LIFF_ID=${{ vars.PDCARE_DEV_LIFF_ID }}
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.FRONTEND_IMAGE }}:${{ env.DEV_FRONTEND_TAG }}

      - name: Build and push prod frontend image
        if: steps.paths.outputs.should_run == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./apps/frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=/api
            NEXT_PUBLIC_LIFF_ID=${{ vars.PDCARE_PROD_LIFF_ID }}
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.FRONTEND_IMAGE }}:${{ env.PROD_FRONTEND_TAG }}

      - name: Update dev overlay image tags
        if: steps.paths.outputs.should_run == 'true'
        run: |
          python - <<'PY'
          from pathlib import Path

          file_path = Path("k8s/overlays/dev/kustomization.yaml")
          lines = file_path.read_text().splitlines()
          backend_tag = "${{ env.BACKEND_TAG }}"
          frontend_tag = "${{ env.DEV_FRONTEND_TAG }}"

          current = None
          for index, line in enumerate(lines):
              stripped = line.strip()
              if stripped == "- name: pd-care-frontend":
                  current = "frontend"
              elif stripped == "- name: pd-care-backend":
                  current = "backend"
              elif stripped.startswith("- name: "):
                  current = None
              elif stripped.startswith("newTag:") and current == "frontend":
                  lines[index] = f"    newTag: {frontend_tag}"
                  current = None
              elif stripped.startswith("newTag:") and current == "backend":
                  lines[index] = f"    newTag: {backend_tag}"
                  current = None

          file_path.write_text("\n".join(lines) + "\n")
          PY

      - name: Configure bot git identity
        if: steps.paths.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit dev promotion
        if: steps.paths.outputs.should_run == 'true'
        run: |
          if git diff --quiet -- k8s/overlays/dev/kustomization.yaml; then
            echo "No dev image changes to commit."
            exit 0
          fi
          git add k8s/overlays/dev/kustomization.yaml
          git commit -m "ci(cd): promote dev images ${BACKEND_TAG}"
          git push origin HEAD:main
