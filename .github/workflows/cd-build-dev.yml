name: CD Build Dev

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

concurrency:
  group: cd-build-dev-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  build-and-promote-dev:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      OWNER: ruby0322
      FRONTEND_IMAGE: pd-care-frontend
      BACKEND_IMAGE: pd-care-backend
      SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Check changed paths
        id: paths
        run: |
          # -m is required for merge commits; plain git show returns no paths on PR merges.
          CHANGED_FILES="$(git show -m --pretty='' --name-only "${SOURCE_SHA}" | sed '/^$/d' | sort -u)"
          echo "Changed files:"
          echo "${CHANGED_FILES}"
          FRONTEND_CHANGED=false
          BACKEND_CHANGED=false
          if echo "${CHANGED_FILES}" | grep -Eq '^apps/frontend/'; then
            FRONTEND_CHANGED=true
          fi
          if echo "${CHANGED_FILES}" | grep -Eq '^apps/backend/'; then
            BACKEND_CHANGED=true
          fi
          SHOULD_RUN=false
          if [[ "${FRONTEND_CHANGED}" == "true" || "${BACKEND_CHANGED}" == "true" ]]; then
            SHOULD_RUN=true
          fi
          echo "frontend_changed=${FRONTEND_CHANGED}" >> "$GITHUB_OUTPUT"
          echo "backend_changed=${BACKEND_CHANGED}" >> "$GITHUB_OUTPUT"
          echo "should_run=${SHOULD_RUN}" >> "$GITHUB_OUTPUT"

      - name: Exit when app code unchanged
        if: steps.paths.outputs.should_run != 'true'
        run: |
          echo "No frontend/backend changes in ${SOURCE_SHA}; skipping image build and dev promotion."
          exit 0

      - name: Set up Docker Buildx
        if: steps.paths.outputs.should_run == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.paths.outputs.should_run == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        if: steps.paths.outputs.should_run == 'true'
        run: |
          echo "BACKEND_TAG=sha-${SOURCE_SHA::12}" >> "$GITHUB_ENV"
          echo "DEV_FRONTEND_TAG=dev-sha-${SOURCE_SHA::12}" >> "$GITHUB_ENV"
          echo "PROD_FRONTEND_TAG=prod-sha-${SOURCE_SHA::12}" >> "$GITHUB_ENV"

      - name: Build and push backend image
        if: steps.paths.outputs.backend_changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./apps/backend
          push: true
          build-args: |
            HF_TOKEN=${{ secrets.HF_TOKEN }}
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.BACKEND_IMAGE }}:${{ env.BACKEND_TAG }}

      - name: Build and push dev frontend image
        if: steps.paths.outputs.frontend_changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./apps/frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=/api
            NEXT_PUBLIC_LIFF_ID=${{ vars.PDCARE_DEV_LIFF_ID }}
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.FRONTEND_IMAGE }}:${{ env.DEV_FRONTEND_TAG }}

      - name: Build and push prod frontend image
        if: steps.paths.outputs.frontend_changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./apps/frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=/api
            NEXT_PUBLIC_LIFF_ID=${{ vars.PDCARE_PROD_LIFF_ID }}
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.FRONTEND_IMAGE }}:${{ env.PROD_FRONTEND_TAG }}

      - name: Update dev overlay image tags
        if: steps.paths.outputs.should_run == 'true'
        run: |
          python - <<'PY'
          from pathlib import Path

          def update_image_tag(file_path: Path, image_name: str, new_tag: str) -> None:
              if not new_tag:
                  return

              lines = file_path.read_text().splitlines()
              current_name = None
              updated = False
              for index, line in enumerate(lines):
                  stripped = line.strip()
                  if stripped.startswith("- name:"):
                      current_name = stripped.split(":", 1)[1].strip()
                      continue
                  if stripped.startswith("newTag:") and current_name == image_name:
                      indent = line[: line.index("newTag:")]
                      lines[index] = f"{indent}newTag: {new_tag}"
                      updated = True
                      current_name = None

              if not updated:
                  raise SystemExit(f"Could not find image entry for {image_name}")
              file_path.write_text("\n".join(lines) + "\n")

          overlay_file = Path("k8s/overlays/dev/kustomization.yaml")
          if "${{ steps.paths.outputs.frontend_changed }}" == "true":
              update_image_tag(overlay_file, "pd-care-frontend", "${{ env.DEV_FRONTEND_TAG }}")
          if "${{ steps.paths.outputs.backend_changed }}" == "true":
              update_image_tag(overlay_file, "pd-care-backend", "${{ env.BACKEND_TAG }}")
          PY

      - name: Configure bot git identity
        if: steps.paths.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit dev promotion
        if: steps.paths.outputs.should_run == 'true'
        run: |
          if git diff --quiet -- k8s/overlays/dev/kustomization.yaml; then
            echo "No dev image changes to commit."
            exit 0
          fi
          git add k8s/overlays/dev/kustomization.yaml
          CHANGED_COMPONENTS=()
          if [[ "${{ steps.paths.outputs.frontend_changed }}" == "true" ]]; then
            CHANGED_COMPONENTS+=("frontend")
          fi
          if [[ "${{ steps.paths.outputs.backend_changed }}" == "true" ]]; then
            CHANGED_COMPONENTS+=("backend")
          fi
          git commit -m "ci(cd): promote dev images (${CHANGED_COMPONENTS[*]})"
          git pull --rebase origin main
          git push origin HEAD:main
