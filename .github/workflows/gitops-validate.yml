name: GitOps Validate

on:
  pull_request:
    branches:
      - dev
      - main
    paths:
      - charts/pd-care/**
      - environments/**
      - ops/gitops/**
      - .github/workflows/gitops-validate.yml

jobs:
  helm-template-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Render SIT manifests
        run: |
          helm template pd-care-sit charts/pd-care -f environments/sit/values.yaml > /tmp/sit.yaml

      - name: Render PROD manifests
        run: |
          helm template pd-care-prod charts/pd-care -f environments/prod/values.yaml > /tmp/prod.yaml
