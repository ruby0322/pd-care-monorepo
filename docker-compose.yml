version: "2.3"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pd_care
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pd_care"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://abbey.lu.im.ntu.edu.tw:8000
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: http://abbey.lu.im.ntu.edu.tw:8000
    ports:
      - "80:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    env_file:
      - ./apps/backend/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/pd_care}
    ports:
      - "8000:8000"
    volumes:
      - model-cache:/models
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  model-cache:
  postgres-data:
