version: "2.3"

services:
  postgres:
    image: postgres:16-alpine
    command:
      - postgres
      - -c
      - hba_file=${PDCARE_POSTGRES_HBA_FILE:-/var/lib/postgresql/data/pg_hba.conf}
    environment:
      POSTGRES_DB: pd_care
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PDCARE_POSTGRES_PASSWORD:-pdcare-local-dev-change-me}
    ports:
      - "${PDCARE_POSTGRES_PORT_BIND:-127.0.0.1:5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./ops/security/postgres/pg_hba.remote.conf:/etc/pd-care/postgres/pg_hba.remote.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pd_care"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  seaweedfs-master:
    image: chrislusf/seaweedfs:3.76
    command: "master -ip=seaweedfs-master -ip.bind=0.0.0.0 -mdir=/data"
    volumes:
      - seaweed-master-data:/data
    ports:
      - "9333:9333"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9333/cluster/status >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  seaweedfs-volume:
    image: chrislusf/seaweedfs:3.76
    command: "volume -mserver=seaweedfs-master:9333 -ip=seaweedfs-volume -ip.bind=0.0.0.0 -dir=/data -max=0"
    depends_on:
      - seaweedfs-master
    volumes:
      - seaweed-volume-data:/data
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/status >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  seaweedfs-filer:
    image: chrislusf/seaweedfs:3.76
    command: "filer -master=seaweedfs-master:9333 -ip=seaweedfs-filer -ip.bind=0.0.0.0 -defaultStoreDir=/data"
    depends_on:
      seaweedfs-master:
        condition: service_healthy
      seaweedfs-volume:
        condition: service_healthy
    volumes:
      - seaweed-filer-data:/data
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8888/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  seaweedfs-s3:
    image: chrislusf/seaweedfs:3.76
    command: "s3 -filer=seaweedfs-filer:8888 -ip.bind=0.0.0.0 -port=8333 -domainName=seaweedfs-s3"
    depends_on:
      seaweedfs-filer:
        condition: service_healthy
    ports:
      - "8333:8333"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8333/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
        NEXT_PUBLIC_LIFF_ID: ${NEXT_PUBLIC_LIFF_ID:-1657724367-uzPg8SgK}
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
      NEXT_PUBLIC_LIFF_ID: ${NEXT_PUBLIC_LIFF_ID:-1657724367-uzPg8SgK}
      TLS_CERT_PATH: /etc/letsencrypt/live/${LETSENCRYPT_DOMAIN:-pd.lu.im.ntu.edu.tw}/fullchain.pem
      TLS_KEY_PATH: /etc/letsencrypt/live/${LETSENCRYPT_DOMAIN:-pd.lu.im.ntu.edu.tw}/privkey.pem
      TLS_UPSTREAM: http://127.0.0.1:3000
    ports:
      - "${PDCARE_HTTPS_PORT:-443}:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${PDCARE_DATABASE_URL:-postgresql+psycopg://postgres:pdcare-local-dev-change-me@postgres:5432/pd_care}
      S3_ENDPOINT_URL: ${PDCARE_S3_ENDPOINT_URL:-http://seaweedfs-s3:8333}
      S3_REGION: ${PDCARE_S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${PDCARE_S3_ACCESS_KEY:-seaweed-access}
      S3_SECRET_KEY: ${PDCARE_S3_SECRET_KEY:-seaweed-secret}
      S3_BUCKET_NAME: ${PDCARE_S3_BUCKET_NAME:-pd-care-private}
      IMAGE_ACCESS_TOKEN_SECRET: ${PDCARE_IMAGE_ACCESS_TOKEN_SECRET:-change-me}
      IMAGE_ACCESS_TOKEN_TTL_SECONDS: ${PDCARE_IMAGE_ACCESS_TOKEN_TTL_SECONDS:-300}
      AUTH_TOKEN_SECRET: ${PDCARE_AUTH_TOKEN_SECRET:-change-me-auth}
      AUTH_TOKEN_TTL_SECONDS: ${PDCARE_AUTH_TOKEN_TTL_SECONDS:-28800}
      PILOT_ADMIN_IDENTITY_IDS: ${PDCARE_PILOT_ADMIN_IDENTITY_IDS:-}
      PILOT_STAFF_IDENTITY_IDS: ${PDCARE_PILOT_STAFF_IDENTITY_IDS:-}
      LINE_VERIFY_MODE: ${PDCARE_LINE_VERIFY_MODE:-line}
      LINE_CHANNEL_ID: ${PDCARE_LINE_CHANNEL_ID:-1657724367}
      LINE_VERIFY_ENDPOINT: ${PDCARE_LINE_VERIFY_ENDPOINT:-https://api.line.me/oauth2/v2.1/verify}
      LINE_VERIFY_TIMEOUT_SECONDS: ${PDCARE_LINE_VERIFY_TIMEOUT_SECONDS:-5}
      PRESCREEN_ENABLED: ${PDCARE_PRESCREEN_ENABLED:-true}
      PRESCREEN_MODEL_REPO_ID: ${PDCARE_PRESCREEN_MODEL_REPO_ID:-ruby0322/pd-exit-site-clip-linear-probe}
      PRESCREEN_MODEL_REVISION: ${PDCARE_PRESCREEN_MODEL_REVISION:-}
      PRESCREEN_REJECT_REASON: ${PDCARE_PRESCREEN_REJECT_REASON:-non_exit_site_or_random_photo}
      PRESCREEN_MODEL_CACHE_DIR: ${PDCARE_PRESCREEN_MODEL_CACHE_DIR:-/models/prescreen}
      HF_TOKEN: ${PDCARE_HF_TOKEN:-}
    ports:
      - "8000:8000"
    volumes:
      - model-cache:/models
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs-s3:
        condition: service_healthy
    restart: unless-stopped

volumes:
  model-cache:
  postgres-data:
  seaweed-filer-data:
  seaweed-master-data:
  seaweed-volume-data:
