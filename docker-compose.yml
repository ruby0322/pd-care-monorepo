version: "2.3"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pd_care
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pd_care"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  seaweedfs-master:
    image: chrislusf/seaweedfs:3.76
    command: "master -ip=seaweedfs-master -ip.bind=0.0.0.0 -mdir=/data"
    volumes:
      - seaweed-master-data:/data
    ports:
      - "9333:9333"
    restart: unless-stopped

  seaweedfs-volume:
    image: chrislusf/seaweedfs:3.76
    command: "volume -mserver=seaweedfs-master:9333 -ip=seaweedfs-volume -ip.bind=0.0.0.0 -dir=/data -max=0"
    depends_on:
      - seaweedfs-master
    volumes:
      - seaweed-volume-data:/data
    ports:
      - "8080:8080"
    restart: unless-stopped

  seaweedfs-filer:
    image: chrislusf/seaweedfs:3.76
    command: "filer -master=seaweedfs-master:9333 -ip=seaweedfs-filer -ip.bind=0.0.0.0"
    depends_on:
      - seaweedfs-master
      - seaweedfs-volume
    ports:
      - "8888:8888"
    restart: unless-stopped

  seaweedfs-s3:
    image: chrislusf/seaweedfs:3.76
    command: "s3 -filer=seaweedfs-filer:8888 -ip.bind=0.0.0.0 -port=8333 -domainName=seaweedfs-s3"
    depends_on:
      - seaweedfs-filer
    ports:
      - "8333:8333"
    restart: unless-stopped

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://abbey.lu.im.ntu.edu.tw:8000
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: http://abbey.lu.im.ntu.edu.tw:8000
    ports:
      - "80:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    env_file:
      - ./apps/backend/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/pd_care}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://seaweedfs-s3:8333}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-seaweed-access}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-seaweed-secret}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-pd-care-private}
      IMAGE_ACCESS_TOKEN_SECRET: ${IMAGE_ACCESS_TOKEN_SECRET:-change-me}
      IMAGE_ACCESS_TOKEN_TTL_SECONDS: ${IMAGE_ACCESS_TOKEN_TTL_SECONDS:-300}
    ports:
      - "8000:8000"
    volumes:
      - model-cache:/models
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs-s3:
        condition: service_started
    restart: unless-stopped

volumes:
  model-cache:
  postgres-data:
  seaweed-master-data:
  seaweed-volume-data:
