# Controlled remote-access pg_hba policy for PD Care.
#
# Usage:
# - Keep default local-only port bind for routine environments:
#     PDCARE_POSTGRES_PORT_BIND=127.0.0.1:5432
# - Enable this file only for intentional remote exposure:
#     PDCARE_POSTGRES_PORT_BIND=0.0.0.0:5432
#     PDCARE_POSTGRES_HBA_FILE=/etc/pd-care/postgres/pg_hba.remote.conf
# - In remote mode, restrict host/network firewall rules to trusted sources.
#
# Rule order matters: first matching rule is applied.

# Local Unix socket access
local   all             all                                     trust

# Loopback access
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256

# Private RFC1918 ranges (Docker bridge/overlay and internal subnets)
host    all             all             10.0.0.0/8              scram-sha-256
host    all             all             172.16.0.0/12           scram-sha-256
host    all             all             192.168.0.0/16          scram-sha-256

# Fail-closed defaults for everything else
host    all             all             0.0.0.0/0               reject
host    all             all             ::/0                    reject
