groups:
  - name: pd-care-backend-alerts
    rules:
      - alert: BackendDown
        expr: up{job="backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "PD Care backend is down"
          description: "Prometheus cannot scrape backend metrics for 2 minutes."

      - alert: BackendHighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{job="backend",status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(http_requests_total{job="backend"}[5m])), 0.001)
          ) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Backend 5xx ratio is high"
          description: "Backend 5xx ratio is above 5% in the past 10 minutes."

      - alert: BackendHighP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(http_request_duration_seconds_bucket{job="backend"}[5m])) by (le)
          ) > 1.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Backend p95 latency is high"
          description: "Backend p95 latency is above 1.5 seconds for 10 minutes."
