# Host port bridge: public 443 -> minikube ingress HTTPS NodePort.
# Port 80 is intentionally not bridged so certbot standalone/http-01 renewal can bind :80.
#
# Usage: docker compose -f docker-compose.ingress-bridge.yml up -d
# MINIKUBE_IP defaults to `minikube ip` output (192.168.49.2).

services:
  ingress-bridge-https:
    image: alpine/socat
    container_name: pd-care-ingress-bridge
    network_mode: host
    restart: unless-stopped
    command:
      - TCP-LISTEN:443,fork,reuseaddr
      - TCP:${MINIKUBE_IP:-192.168.49.2}:${INGRESS_HTTPS_NODEPORT:-30793}
