nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/example/pd-care-backend
  tag: "latest"
  pullPolicy: IfNotPresent
  pullSecrets: []

service:
  type: ClusterIP
  port: 8000

deployment:
  replicaCount: 2
  minReadySeconds: 10
  progressDeadlineSeconds: 600
  revisionHistoryLimit: 5
  strategy:
    maxUnavailable: 0
    maxSurge: 25%
  terminationGracePeriodSeconds: 60
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

probes:
  startup:
    enabled: true
    path: /healthz
    periodSeconds: 10
    failureThreshold: 18
  readiness:
    path: /readyz
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3
  liveness:
    path: /healthz
    initialDelaySeconds: 15
    periodSeconds: 20
    failureThreshold: 3

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1

topologySpreadConstraints:
  enabled: true
  maxSkew: 1
  topologyKey: kubernetes.io/hostname
  whenUnsatisfiable: DoNotSchedule

networkPolicy:
  enabled: true
  allowedNamespaces: []
