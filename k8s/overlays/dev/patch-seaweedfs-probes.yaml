apiVersion: apps/v1
kind: Deployment
metadata:
  name: seaweedfs-volume
spec:
  template:
    spec:
      containers:
        - name: seaweedfs-volume
          startupProbe:
            httpGet:
              path: /status
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /status
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /status
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 20
            timeoutSeconds: 3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seaweedfs-filer
spec:
  template:
    spec:
      containers:
        - name: seaweedfs-filer
          startupProbe:
            httpGet:
              path: /
              port: 8888
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8888
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8888
            initialDelaySeconds: 120
            periodSeconds: 20
            timeoutSeconds: 3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seaweedfs-s3
spec:
  template:
    spec:
      containers:
        - name: seaweedfs-s3
          startupProbe:
            httpGet:
              path: /
              port: 8333
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8333
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8333
            initialDelaySeconds: 150
            periodSeconds: 20
            timeoutSeconds: 3
