apiVersion: batch/v1
kind: Job
metadata:
  name: backend-migrate
  labels:
    app: backend-migrate
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "0"
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: backend-migrate
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: pd-care-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["python3", "-m", "alembic", "-c", "alembic.ini", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: pd-care-config
          env:
            - name: RUN_DB_MIGRATIONS
              value: "true"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pd-care-secrets
                  key: DATABASE_URL
