apiVersion: batch/v1
kind: Job
metadata:
  name: backend-migrate
  labels:
    app: backend-migrate
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded,HookFailed
    argocd.argoproj.io/sync-wave: "0"
spec:
  backoffLimit: 2
  # Fail the hook if pull/migrate hangs (ImagePullBackOff otherwise keeps the Job Running forever).
  activeDeadlineSeconds: 7200
  template:
    metadata:
      labels:
        app: backend-migrate
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: migrate
          image: pd-care-backend:latest
          imagePullPolicy: Always
          command: ["python3", "-m", "alembic", "-c", "alembic.ini", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: pd-care-config
          env:
            - name: RUN_DB_MIGRATIONS
              value: "true"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pd-care-secrets
                  key: DATABASE_URL
