apiVersion: v1
kind: Secret
metadata:
  name: pd-care-secrets
type: Opaque
stringData:
  # Replace these before production-like use.
  # Overlay examples: k8s/overlays/dev/secret.yaml.example, k8s/overlays/prod/secret.yaml.example
  # Applied secrets (k8s/overlays/*/secret.yaml) are gitignored — never commit real credentials.
  PDCARE_POSTGRES_PASSWORD: "pdcare-local-dev-change-me"
  DATABASE_URL: "postgresql+psycopg://postgres:pdcare-local-dev-change-me@postgres:5432/pd_care"
  S3_ACCESS_KEY: "seaweed-access"
  S3_SECRET_KEY: "seaweed-secret"
  IMAGE_ACCESS_TOKEN_SECRET: "change-me"
  AUTH_TOKEN_SECRET: "change-me-auth"
  HF_TOKEN: ""
