apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: pd-care-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: pd-care-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pd-care-secrets
                  key: DATABASE_URL
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: pd-care-secrets
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: pd-care-secrets
                  key: S3_SECRET_KEY
            - name: IMAGE_ACCESS_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: pd-care-secrets
                  key: IMAGE_ACCESS_TOKEN_SECRET
            - name: AUTH_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: pd-care-secrets
                  key: AUTH_TOKEN_SECRET
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pd-care-secrets
                  key: HF_TOKEN
          volumeMounts:
            - name: model-cache
              mountPath: /models
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: 1
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /readyz
              port: 8000
            failureThreshold: 30
            periodSeconds: 10
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache
